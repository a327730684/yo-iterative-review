name: po-docs-db Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "version to release (e.g. 1.2.3), empty = bump patch automatically"
        required: false
        type: string
        default: ""

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    defaults:
      run:
        working-directory: lib/po-docs-db

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Resolve version
        id: ver
        run: |
          CUR=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "current=$CUR" >> "$GITHUB_OUTPUT"
          if [ -n "${{ inputs.version }}" ]; then
            NEW="${{ inputs.version }}"
          else
            IFS=. read -r MAJ MIN PAT <<< "$CUR"
            NEW="$MAJ.$MIN.$((PAT+1))"
          fi
          uv run python -c "
          from pathlib import Path
          t = Path('pyproject.toml').read_text()
          t = t.replace('version = \"$CUR\"', 'version = \"$NEW\"', 1)
          Path('pyproject.toml').write_text(t)
          "
          echo "new_version=$NEW" >> "$GITHUB_OUTPUT"

      - name: Test
        run: uv run pytest tests/ -v

      - name: Build
        run: uv build

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: lib/po-docs-db/dist/
