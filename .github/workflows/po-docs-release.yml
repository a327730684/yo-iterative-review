name: po-docs-db Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "version to release (e.g. 1.2.3)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    defaults:
      run:
        working-directory: lib/po-docs-db

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tool
        run: pip install build

      - name: Set version
        run: |
          python -c "
          from pathlib import Path
          t = Path('pyproject.toml').read_text()
          new = 'version = \"${{ inputs.version }}\"'
          lines = [new if l.startswith('version = ') else l for l in t.splitlines(keepends=True)]
          Path('pyproject.toml').write_text(''.join(lines))
          "

      - name: Build
        run: python -m build

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: lib/po-docs-db/dist/
